<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grants Current Favorite Songs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #015825;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background: #111;
      color: white;
      padding: 1.5rem 0;
      font-size: 1.8rem;
      letter-spacing: 1px;
    }

    .song-gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* Always 3 per row */
    gap: 20px;
    padding: 40px;
    justify-items: center;
    }



    .song-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      transition: transform 0.2s ease-in-out;
      width: 220px;
    }

    .song-card:hover {
      transform: translateY(-5px);
    }

    .album-cover {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .song-title {
      padding: 10px;
      background: #222;
      color: white;
      font-size: 1rem;
      text-align: center;
    }

    footer {
      background: #111;
      color: #aaa;
      padding: 10px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>🎵 Grant's Favorite Songs 🎵</header>

  <main class="song-gallery">
    <!-- Song 1 -->
    <div class="song-card">
      <img src="images/toto.jpg" alt="Album Cover 1" class="album-cover" />
      <div class="song-title">Toto - Africa</div>
    </div>

    <!-- Song 2 -->
    <div class="song-card">
      <img src="images/police.jpg" alt="Album Cover 2" class="album-cover" />
      <div class="song-title">Synchronicity II - The Police</div>
    </div>

    <!-- Song 3 -->
    <div class="song-card">
      <img src="images/kansas.jpg" alt="Album Cover 3" class="album-cover" />
      <div class="song-title">Dust in the Wind - Kansas</div>
    </div>

    <div class="song-card">
      <img src="images/dakota.jpg" alt="Album Cover 3" class="album-cover" />
      <div class="song-title">Into the Night - Dakota</div>
    </div>

    <div class="song-card">
      <img src="images/stranger.jpg" alt="Album Cover 3" class="album-cover" />
      <div class="song-title">The Stranger - Billy Joel</div>
    </div>

    <div class="song-card">
      <img src="images/clouds.jpg" alt="Album Cover 3" class="album-cover" />
      <div class="song-title">Suite: Clouds, Rain - David Gates</div>
    </div>
    <!-- Add more songs below -->
  </main>

  <footer>© 2025 My Music Collection

  </footer>


</body>
</html>
